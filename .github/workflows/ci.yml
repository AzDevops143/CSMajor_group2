name: SNOOPFINGER Evaluation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-evals:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib wordfreq

    - name: Run Baseline Evaluation
      run: python baseline_eval.py

    - name: Run Countermeasure Evaluation
      run: python countermeasure_eval.py

    - name: Run Demo (Non-Interactive)
      run: python demo.py --auto

    - name: Upload Generated Figures
      uses: actions/upload-artifact@v4
      with:
        name: evaluation-plots
        path: |
          fig_baseline_accuracy_by_length.png
          fig_obfuscation_accuracy_curves.png
          fig_obfuscation_pareto.png
